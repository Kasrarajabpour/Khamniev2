<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رأی‌گیری شورای دانش‌آموزی | مدرسه امام خامنه‌ای</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .voting-container { max-width: 1200px; margin: 100px auto 40px; padding: 20px; }
        .voting-header { background: rgba(255,255,255,0.95); border-radius: 30px; padding: 30px; text-align: center; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .voting-header h1 { color: #1e3c2c; margin-bottom: 10px; }
        .voting-header p { color: #555; }
        .election-info { background: #ffd966; border-radius: 20px; padding: 15px; margin-top: 15px; font-weight: bold; }
        .round-badge { background: #1e3c2c; color: white; padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 15px; font-size: 0.9rem; }
        .candidates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .candidate-card { background: white; border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; border: 3px solid transparent; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .candidate-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .candidate-card.selected { border-color: #ff8c00; background: #fff8e7; transform: scale(1.02); }
        .candidate-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 15px; border: 4px solid #ffd966; }
        .candidate-name { font-size: 1.5rem; font-weight: bold; color: #1e3c2c; margin: 10px 0; }
        .candidate-class { color: #ff8c00; font-weight: bold; margin-bottom: 10px; }
        .candidate-slogan { color: #666; font-size: 0.9rem; margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 15px; }
        .checkmark { display: inline-block; width: 30px; height: 30px; background: #ffd966; border-radius: 50%; line-height: 30px; margin-top: 10px; font-weight: bold; color: #1e3c2c; }
        .selected-count { background: #1e3c2c; color: white; padding: 12px 25px; border-radius: 50px; text-align: center; margin: 20px auto; display: inline-block; width: auto; }
        .submit-btn { background: #ff8c00; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; display: block; margin: 20px auto; width: 250px; }
        .submit-btn:hover { background: #e67e00; transform: scale(1.05); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .already-voted { text-align: center; padding: 40px; background: white; border-radius: 30px; margin-top: 50px; }
        .already-voted h2 { color: #e74c3c; }
        .election-closed { text-align: center; padding: 40px; background: #f39c12; color: white; border-radius: 30px; }
        .election-closed a { color: white; }
        .no-candidates { text-align: center; padding: 40px; background: white; border-radius: 30px; }
        @media (max-width: 768px) { .voting-container { margin-top: 80px; } .candidates-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-section">
            <div class="hamburger-menu" id="hamburgerBtn">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
        <div class="right-section">
            <div class="profile-section" id="profileSection" style="display: none;">
                <div class="profile-avatar"><div class="avatar-circle">👤</div></div>
                <div class="profile-name" id="profileName">کاربر</div>
                <div class="profile-dropdown"><a href="#" id="logoutBtn">🚪 خروج</a></div>
            </div>
        </div>
    </div>

    <nav class="side-menu" id="sideMenu">
        <ul>
            <li><a href="index.html">🏠 صفحه اصلی</a></li>
            <li><a href="voting.html">🗳️ رأی‌گیری شورای دانش‌آموزی</a></li>
            <li><a href="admin.html" id="adminLink" style="display: none;">👑 پنل ادمین</a></li>
            <li><a href="booking.html">📅 نوبت‌گیری مشاور مدرسه</a></li>
            <li><a href="index.html#announcements">📢 اطلاعیه‌های مدرسه</a></li>
        </ul>
    </nav>

    <div class="voting-container">
        <div class="voting-header">
            <h1>🗳️ انتخابات شورای دانش‌آموزی</h1>
            <p>به 3 نامزد مورد نظر خود رأی دهید</p>
            <div class="round-badge" id="roundBadge"></div>
            <div class="election-info" id="electionInfo"></div>
        </div>
        <div id="votingArea"></div>
    </div>

    <script src="data-manager.js"></script>
    <script>
        let selectedCandidates = [];
        let currentUser = null;
        let candidatesList = [];
        let hasVoted = false;
        let electionActive = true;
        let currentRound = 1;
        const MAX_VOTES = 3;
        
        // ==================== منوی همبرگری ====================
        function initHamburgerMenu() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const sideMenu = document.getElementById('sideMenu');
            if (hamburgerBtn && sideMenu) {
                hamburgerBtn.addEventListener('click', function(e) { 
                    e.stopPropagation(); 
                    hamburgerBtn.classList.toggle('active'); 
                    sideMenu.classList.toggle('open'); 
                });
                const menuLinks = document.querySelectorAll('.side-menu a');
                menuLinks.forEach(link => { 
                    link.addEventListener('click', function() { 
                        hamburgerBtn.classList.remove('active'); 
                        sideMenu.classList.remove('open'); 
                    }); 
                });
                document.addEventListener('click', function(event) { 
                    if (!hamburgerBtn.contains(event.target) && !sideMenu.contains(event.target)) { 
                        hamburgerBtn.classList.remove('active'); 
                        sideMenu.classList.remove('open'); 
                    } 
                });
            }
        }
        
        // ==================== پروفایل ====================
        function initProfile() {
            const profileSection = document.getElementById('profileSection');
            if(profileSection) {
                profileSection.addEventListener('click', function(e) { 
                    e.stopPropagation(); 
                    profileSection.classList.toggle('active'); 
                });
                document.addEventListener('click', function() { 
                    profileSection.classList.remove('active'); 
                });
            }
            document.getElementById('logoutBtn')?.addEventListener('click', function(e) { 
                e.preventDefault(); 
                sessionStorage.removeItem("currentUser"); 
                window.location.href = "index.html"; 
            });
        }

        async function loadPage() {
            currentUser = JSON.parse(sessionStorage.getItem("currentUser") || "null");
            if (!currentUser) { 
                alert("لطفاً ابتدا وارد شوید!");
                window.location.href = "index.html"; 
                return; 
            }
            
            initHamburgerMenu();
            initProfile();
            
            document.getElementById("profileSection").style.display = "flex";
            document.getElementById("profileName").innerHTML = `${currentUser.firstName} ${currentUser.lastName}`;
            if(currentUser.role === 'admin') document.getElementById("adminLink").style.display = "block";
            
            await refreshData();
            candidatesList = await getCandidates();
            electionActive = await getElectionStatus();
            currentRound = await getCurrentRound();
            
            document.getElementById("roundBadge").innerHTML = `📅 دوره شماره ${currentRound}`;
            hasVoted = await hasUserVotedInCurrentRound(currentUser.nationalCode);
            
            renderVotingPage();
        }

        function renderVotingPage() {
            const area = document.getElementById("votingArea");
            const infoDiv = document.getElementById("electionInfo");
            
            if (!electionActive) {
                infoDiv.innerHTML = "🔴 انتخابات بسته است";
                area.innerHTML = `<div class="election-closed"><h2>⛔ انتخابات به پایان رسیده است</h2><p>از مشارکت شما سپاسگزاریم</p><a href="index.html" style="color:white;">بازگشت به صفحه اصلی</a></div>`;
                return;
            }
            
            infoDiv.innerHTML = "🟢 انتخابات در جریان است";
            
            if (hasVoted) {
                area.innerHTML = `<div class="already-voted"><h2>✅ شما قبلاً در این دوره انتخابات شرکت کرده‌اید</h2><p>از مشارکت شما سپاسگزاریم</p><div style="margin-top:20px">📅 دوره شماره ${currentRound}</div><a href="index.html" style="display:inline-block; margin-top:20px; background:#ff8c00; color:white; padding:10px 30px; border-radius:50px; text-decoration:none">بازگشت به صفحه اصلی</a></div>`;
                return;
            }
            
            if (candidatesList.length === 0) {
                area.innerHTML = `<div class="no-candidates"><h2>⚠️ هنوز نامزدی ثبت نشده است</h2><p>لطفاً بعداً مراجعه کنید</p><a href="index.html">بازگشت به صفحه اصلی</a></div>`;
                return;
            }
            
            let html = `<div class="candidates-grid">`;
            candidatesList.forEach(c => {
                const isSelected = selectedCandidates.includes(c.id);
                html += `<div class="candidate-card ${isSelected ? 'selected' : ''}" onclick="toggleCandidate(${c.id})">
                    <img src="${c.img}" class="candidate-img" onerror="this.src='https://via.placeholder.com/120?text=عکس+نیست'">
                    <div class="candidate-name">${c.name}</div>
                    <div class="candidate-class">${c.class}</div>
                    <div class="candidate-slogan">📢 "${c.slogan}"</div>
                    ${isSelected ? '<div class="checkmark">✓</div>' : ''}
                </div>`;
            });
            html += `</div>`;
            html += `<div style="text-align:center">
                        <div class="selected-count">🗳️ تعداد انتخاب‌شده: ${selectedCandidates.length} از ${MAX_VOTES}</div>
                        <button class="submit-btn" id="submitBtn" ${selectedCandidates.length === 0 ? 'disabled' : ''}>ثبت آرای من</button>
                    </div>`;
            area.innerHTML = html;
            
            const submitBtn = document.getElementById("submitBtn");
            if(submitBtn) submitBtn.addEventListener("click", submitVote);
        }

        function toggleCandidate(id) {
            if (hasVoted || !electionActive) return;
            const index = selectedCandidates.indexOf(id);
            if (index === -1) {
                if (selectedCandidates.length >= MAX_VOTES) { 
                    alert(`حداکثر می‌توانید به ${MAX_VOTES} نفر رأی دهید!`); 
                    return; 
                }
                selectedCandidates.push(id);
            } else { 
                selectedCandidates.splice(index, 1); 
            }
            renderVotingPage();
        }

        async function submitVote() {
            if (selectedCandidates.length === 0) { 
                alert("لطفاً حداقل یک نامزد را انتخاب کنید!"); 
                return; 
            }
            
            const submitBtn = document.getElementById("submitBtn");
            if(submitBtn) submitBtn.disabled = true;
            
            const result = await addVote(currentUser.nationalCode, selectedCandidates);
            
            if (result.success) { 
                alert("✅ رأی شما با موفقیت ثبت شد!"); 
                hasVoted = true; 
                renderVotingPage(); 
            } else { 
                alert(result.message); 
                if(submitBtn) submitBtn.disabled = false;
            }
        }

        document.addEventListener("DOMContentLoaded", loadPage);
    </script>
</body>
</html>
